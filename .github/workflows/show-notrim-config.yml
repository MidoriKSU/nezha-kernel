name: Show All Bazel Defconfig Fragments

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle

      - name: Show Key Defconfig Fragments
        run: |
          DIR="kernel_workspace/build/kernel/kleaf/impl/defconfig"
          
          echo "=== notrim_defconfig ==="
          cat $DIR/notrim_defconfig
          
          echo ""
          echo "=== lto_none_defconfig ==="
          cat $DIR/lto_none_defconfig
          
          echo ""
          echo "=== rust_defconfig ==="
          cat $DIR/rust_defconfig
          
          echo ""
          echo "=== signing_modules_disabled_defconfig ==="
          cat $DIR/signing_modules_disabled_defconfig
          
          echo ""
          echo "=== debug_defconfig ==="
          cat $DIR/debug_defconfig
          
          echo ""
          echo "=== btf_debug_info_enabled_defconfig ==="
          cat $DIR/btf_debug_info_enabled_defconfig
