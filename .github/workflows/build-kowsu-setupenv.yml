name: Build KowSU with Official GKI Method

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device'
        required: true
        type: choice
        options:
          - nezha
          - popsicl

jobs:
  build:
    name: KowSU ${{ inputs.device }} Official GKI
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync GKI Kernel
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g; s/-maybe-dirty//g' common/scripts/setlocalversion || true

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          if [ ! -d "KernelSU" ]; then
            git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
            ln -sf ../KernelSU/kernel drivers/kernelsu
            grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch" 2>/dev/null || true

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          device: ${{ inputs.device }}
          enable_susfs: "false"

      - name: Inject Patches & KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '1a export KBUILD_BUILD_USER="kleaf"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_HOST="build-host"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_VERSION="1"' scripts/mkcompile_h
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android16-5-g5a0e85dd9db0-ab14499855-4k"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c
          rm -rf android/abi_gki_protected_exports_* || true

      - name: Compile Official GKI Kernel
        run: |
          cd kernel_workspace
          export ROOT_DIR="$(pwd)"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          
          # 1. Initialize Kleaf environment (the soul of 18.7MB build)
          source build/_setup_env.sh
          
          # 2. Create cc-wrapper for identity spoofing
          REAL_CLANG="$(which clang)"
          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"
              exit 0
          fi
          exec "$REAL_CLANG" "\$@"
          EOF
          chmod +x cc-wrapper
          export CC="$(pwd)/cc-wrapper"
          
          cd common
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-mbranch-protection=standard -fstack-protector-strong"
          
          echo "=== TOOL_ARGS: ${TOOL_ARGS} ==="
          echo "=== Current Clang: ${REAL_CLANG} ==="
          
          # 3. Generate config
          make -j$(nproc --all) O=out ${TOOL_ARGS} KCFLAGS="$KCFLAGS" gki_defconfig
          
          # 4. Force 4K pages for device compatibility
          scripts/config --file out/.config -e CONFIG_ARM64_4K_PAGES
          scripts/config --file out/.config -d CONFIG_ARM64_16K_PAGES
          scripts/config --file out/.config -d CONFIG_ARM64_64K_PAGES
          make -j$(nproc --all) O=out ${TOOL_ARGS} olddefconfig
          
          # 5. Build
          make -j$(nproc --all) O=out ${TOOL_ARGS} KCFLAGS="$KCFLAGS" Image
          
          echo "=== Image size ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Package
        run: |
          IMAGE="kernel_workspace/common/out/arch/arm64/boot/Image"
          if [ ! -f "$IMAGE" ]; then
            echo "Image not found!"
            exit 1
          fi
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-${{ inputs.device }}-official-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-${{ inputs.device }}-official
          path: ${{ env.ZIP_NAME }}
