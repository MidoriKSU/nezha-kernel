name: Build KowSU with _setup_env.sh

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device'
        required: true
        type: choice
        options:
          - nezha
          - popsicl

jobs:
  build:
    name: KowSU ${{ inputs.device }} make
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Clone GKI Kernel (Google Source)
        run: |
          if [ ! -d "kernel_workspace/common" ]; then
            mkdir -p kernel_workspace
            aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/android16-6.12-2025-06.tar.gz -o kernel_workspace/common.tar.gz
            cd kernel_workspace
            mkdir common && tar -xf common.tar.gz -C common && rm common.tar.gz
          fi

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          if [ ! -d "KernelSU" ]; then
            git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
            ln -sf ../KernelSU/kernel drivers/kernelsu
            grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch" 2>/dev/null || true

      - name: Setup Build Environment
        run: |
          # Copy _setup_env.sh and build.config.gki
          cp "${{ github.workspace }}/.github/scripts/_setup_env.sh" kernel_workspace/_setup_env.sh
          
          cat > kernel_workspace/build.config.gki << 'CONFEOF'
          DEFCONFIG=gki_defconfig
          POST_DEFCONFIG_CMDS="check_defconfig"
          CONFEOF

      - name: Inject Configs & Patches
        run: |
          cd kernel_workspace/common
          
          # Set up version
          sed -i '1a export KBUILD_BUILD_USER="kleaf"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_HOST="build-host"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_VERSION="1"' scripts/mkcompile_h
          
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android16-5-g5a0e85dd9db0-ab14499855-4k"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion

          # KMI bypass
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c
          rm -rf android/abi_gki_protected_exports_* || true

          # Inject networking/BBR/netfilter configs
          cat >> arch/arm64/configs/gki_defconfig << 'CONFEOF'

          # KowSU
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y

          # Networking Configuration
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y

          # IPSet & TProxy Suite
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFEOF

      - name: Compile Kernel (with _setup_env.sh)
        run: |
          cd kernel_workspace
          
          # Source Bazel-equivalent build environment
          source _setup_env.sh
          
          cd common
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          echo "=== OUT_DIR: ${OUT_DIR} ==="
          echo "=== TOOL_ARGS: ${TOOL_ARGS} ==="
          
          make -j$(nproc --all) O=${OUT_DIR} ${TOOL_ARGS} gki_defconfig
          make -j$(nproc --all) O=${OUT_DIR} ${TOOL_ARGS} olddefconfig
          make -j$(nproc --all) O=${OUT_DIR} ${TOOL_ARGS} Image
          
          echo "=== Image size ==="
          ls -lh ${OUT_DIR}/arch/arm64/boot/Image

      - name: Package
        run: |
          cd kernel_workspace
          source _setup_env.sh
          
          IMAGE="${OUT_DIR}/arch/arm64/boot/Image"
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-${{ inputs.device }}-setupenv-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-${{ inputs.device }}-setupenv
          path: ${{ env.ZIP_NAME }}
