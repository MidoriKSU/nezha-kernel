name: Build KowSU with _setup_env.sh

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device'
        required: true
        type: choice
        options:
          - nezha
          - popsicl

jobs:
  build:
    name: KowSU ${{ inputs.device }} make
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Clone GKI Kernel
        run: |
          if [ ! -d "kernel_workspace/common" ]; then
            mkdir -p kernel_workspace
            aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/android16-6.12-2025-06.tar.gz -o kernel_workspace/common.tar.gz
            cd kernel_workspace
            mkdir common && tar -xf common.tar.gz -C common && rm common.tar.gz
          fi

      - name: Init Toolchain (AOSP Clang)
        run: |
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/clang-r536225.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-aosp" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-aosp"
          echo "$GITHUB_WORKSPACE/clang-aosp/bin" >> $GITHUB_PATH
          echo "CLANG_BIN=$GITHUB_WORKSPACE/clang-aosp/bin" >> $GITHUB_ENV

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          if [ ! -d "KernelSU" ]; then
            git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
            ln -sf ../KernelSU/kernel drivers/kernelsu
            grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch" 2>/dev/null || true

      - name: Setup Build Environment
        run: |
          cp "${{ github.workspace }}/.github/scripts/_setup_env.sh" kernel_workspace/_setup_env.sh
          echo "Build environment ready"

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          device: ${{ inputs.device }}
          enable_susfs: "false"

      - name: Inject Patches & KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '1a export KBUILD_BUILD_USER="kleaf"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_HOST="build-host"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_VERSION="1"' scripts/mkcompile_h
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android16-5-g5a0e85dd9db0-ab14499855-4k"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c
          rm -rf android/abi_gki_protected_exports_* || true

      - name: Compile Kernel (with _setup_env.sh)
        run: |
          cd kernel_workspace
          export KERNEL_DIR=common
          export BUILD_CONFIG=common/build.config.gki.aarch64
          source _setup_env.sh
          
          echo "=== OUT_DIR: ${OUT_DIR} ==="
          echo "=== TOOL_ARGS: ${TOOL_ARGS} ==="
          echo "=== DEFCONFIG: ${DEFCONFIG} ==="
          
          cd common
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make -j$(nproc --all) O=${OUT_DIR} ${TOOL_ARGS} ${DEFCONFIG}
          make -j$(nproc --all) O=${OUT_DIR} ${TOOL_ARGS} Image
          
          echo "=== Image size ==="
          ls -lh ${OUT_DIR}/arch/arm64/boot/Image

      - name: Package
        run: |
          cd kernel_workspace
          export KERNEL_DIR=common
          export BUILD_CONFIG=common/build.config.gki.aarch64
          source _setup_env.sh
          
          IMAGE="${OUT_DIR}/arch/arm64/boot/Image"
          if [ ! -f "$IMAGE" ]; then
            echo "Image not found at $IMAGE"
            find . -name "Image" -type f -ls
            exit 1
          fi
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-${{ inputs.device }}-setupenv-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-${{ inputs.device }}-setupenv
          path: kernel_workspace/${{ env.ZIP_NAME }}
