name: Build KowSU with Bazel config

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device'
        required: true
        type: choice
        options:
          - nezha
          - popsicl

jobs:
  build:
    name: KowSU ${{ inputs.device }} make
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync GKI Kernel
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g; s/-maybe-dirty//g' common/scripts/setlocalversion || true

      - name: Init Toolchain (AOSP Clang r536225)
        run: |
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/clang-r536225.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-aosp" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-aosp"
          echo "$GITHUB_WORKSPACE/clang-aosp/bin" >> $GITHUB_PATH
          echo "CLANG_BIN=$GITHUB_WORKSPACE/clang-aosp/bin" >> $GITHUB_ENV

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          if [ ! -d "KernelSU" ]; then
            git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
            ln -sf ../KernelSU/kernel drivers/kernelsu
            grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch" 2>/dev/null || true

      - name: Inject Patches & KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '1a export KBUILD_BUILD_USER="kleaf"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_HOST="build-host"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_VERSION="1"' scripts/mkcompile_h
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android16-5-g5a0e85dd9db0-ab14499855-4k"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c
          rm -rf android/abi_gki_protected_exports_* || true

      - name: Apply Bazel .config & Inject Network Configs
        run: |
          cd kernel_workspace/common
          export ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu-
          
          # Copy Bazel reference .config
          cp "${{ github.workspace }}/config/bazel_config" .config
          
          # Inject our LOCALVERSION
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-android16-5-g5a0e85dd9db0-ab14499855-4k"|' .config
          
          # Ensure KSU is enabled
          grep -q "CONFIG_KSU=y" .config || echo "CONFIG_KSU=y" >> .config
          grep -q "CONFIG_KPROBES=y" .config || echo "CONFIG_KPROBES=y" >> .config
          grep -q "CONFIG_HAVE_KPROBES=y" .config || echo "CONFIG_HAVE_KPROBES=y" >> .config
          
          # Inject networking configs if missing
          grep -q "CONFIG_NETFILTER_XT_TARGET_TPROXY=y" .config || sed -i '/CONFIG_KSU/a\CONFIG_NETFILTER_XT_TARGET_TPROXY=y' .config
          grep -q "CONFIG_TCP_CONG_BBR=y" .config || sed -i '/CONFIG_TCP_CONG_ADVANCED/a\CONFIG_TCP_CONG_BBR=y' .config
          
          mkdir -p out
          cp .config out/.config
          make O=out olddefconfig

      - name: Compile Kernel
        run: |
          cd kernel_workspace/common
          export PATH="$GITHUB_WORKSPACE/clang-aosp/bin:$PATH"
          export ARCH=arm64
          export LLVM=1 LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export KCFLAGS="-mbranch-protection=standard -fstack-protector-strong -fno-strict-aliasing"
          
          make -j$(nproc --all) O=out Image
          
          echo "=== Image size ==="
          ls -lh out/arch/arm64/boot/Image
          echo "=== Check LOCALVERSION ==="
          grep "CONFIG_LOCALVERSION" out/.config
          echo "=== Check Page Size ==="
          grep "CONFIG_ARM64_.*K_PAGES" out/.config | grep -v "^#"
          echo "=== Check LTO ==="
          grep "CONFIG_LTO" out/.config | grep -v "^#"

      - name: Package
        run: |
          IMAGE="kernel_workspace/common/out/arch/arm64/boot/Image"
          if [ ! -f "$IMAGE" ]; then
            echo "Image not found!"
            exit 1
          fi
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-${{ inputs.device }}-bazelconfig-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-${{ inputs.device }}-bazelconfig
          path: ${{ env.ZIP_NAME }}
