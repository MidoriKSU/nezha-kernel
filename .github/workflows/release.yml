name: Release · Publish Artifacts

on:
  workflow_call:
    inputs:
      ksu_variant:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      kernel_ver:
        required: true
        type: string
      release_title:
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish · ${{ inputs.kernel_ver }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'kernel-*'
          path: release_zips
          merge-multiple: true

      - name: Compose Release Body
        run: |
          KV="${{ inputs.kernel_ver }}"

          FILE_LIST=""
          for f in release_zips/*.zip; do
            FILE_LIST="${FILE_LIST}- \`$(basename "$f")\`\n"
          done

          cat <<RELEASE_BODY > release_body.md
          ### 📦 Files
          $(printf "%b" "$FILE_LIST")

          > **Device:** Xiaomi Popsicle · SM8850
          > **Android:** 16 · GKI \`${KV}\`
          > **Built:** \`$(date -u +'%Y-%m-%d %H:%M UTC')\`

          ---

          ### 📲 Installation

          1. Boot into a custom recovery (e.g. TWRP) **or** use a root-capable flasher
          2. Flash the \`.zip\` matching your desired variant
          3. Reboot and verify root via the KernelSU app

          > ⚠️ **Back up your current boot image before flashing.**
          > This kernel is provided as-is, without warranty of any kind.

          ---

          ### 🔗 References

          - [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU)
          - [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU)
          - [simonpunk/susfs4ksu](https://gitlab.com/simonpunk/susfs4ksu)
          - [yapixel/AnyKernel3](https://github.com/yapixel/AnyKernel3)
          RELEASE_BODY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "${{ inputs.release_title }} · ${{ inputs.release_tag }}"
          body_path: release_body.md
          files: release_zips/*.zip