name: Build KowSU with Bazel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device'
        required: true
        type: choice
        options:
          - nezha
          - popsicl

jobs:
  build:
    name: KowSU ${{ inputs.device }} Bazel
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync GKI Kernel
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g; s/-maybe-dirty//g' common/scripts/setlocalversion || true

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch" 2>/dev/null || true

      - name: Inject Configs & Patches (like MidoriSU)
        run: |
          cd kernel_workspace/common
          
          # Set up version
          sed -i '1a export KBUILD_BUILD_USER="kleaf"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_HOST="build-host"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"' scripts/mkcompile_h
          sed -i '1a export KBUILD_BUILD_VERSION="1"' scripts/mkcompile_h
          
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android16-5-g5a0e85dd9db0-ab14499855-4k"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion

          # KMI bypass
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c
          rm -rf android/abi_gki_protected_exports_* || true
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' BUILD.bazel || true
          sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl || true

          # Inject networking+BBR configs directly into gki_defconfig
          cat >> arch/arm64/configs/gki_defconfig << 'CONFEOF'

          # Networking Configuration
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y

          # IPSet & TProxy Suite
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFEOF

          # Git commit all changes
          git config --global user.email "ci@nezha.kernel"
          git config --global user.name "CI"
          git add .
          git commit -m "Inject KowSU / Networking / KMI Bypass" || echo "nothing to commit"

      - name: Create Bazel Fragment
        run: |
          cat > kernel_workspace/common/arch/arm64/configs/kowsu.fragment << 'FRAGEOF'
          CONFIG_LOCALVERSION=""
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          FRAGEOF

      - name: Build with Bazel
        run: |
          cd kernel_workspace
          tools/bazel build --config=release --stamp --notrim \
            --defconfig_fragment=//common:arch/arm64/configs/kowsu.fragment \
            //common:kernel_aarch64_dist
          
          echo "=== Find Image ==="
          find bazel-bin -name "Image" -type f -ls 2>/dev/null || echo "Image not found"

      - name: Package
        run: |
          IMAGE=$(find kernel_workspace/bazel-bin -name "Image" -type f 2>/dev/null | head -1)
          if [ -z "$IMAGE" ]; then
            echo "Image not found!"
            exit 1
          fi
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-${{ inputs.device }}-bazel-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-${{ inputs.device }}-bazel
          path: ${{ env.ZIP_NAME }}
