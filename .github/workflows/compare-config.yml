name: Compare Bazel vs Make .config

on:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 curl

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g; s/-maybe-dirty//g' common/scripts/setlocalversion || true

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Copy Bazel Fragment
        run: |
          cp .github/actions/kernel-config/nezha_gki.fragment kernel_workspace/common/arch/arm64/configs/nezha_gki.fragment
          echo "=== Fragment ==="
          cat kernel_workspace/common/arch/arm64/configs/nezha_gki.fragment

      - name: Generate Bazel .config
        run: |
          cd kernel_workspace
          tools/bazel build --config=fast --lto=none --notrim \
            --defconfig_fragment=//common:arch/arm64/configs/nezha_gki.fragment \
            //common:kernel_aarch64_config
          cp bazel-bin/common/kernel_aarch64_config/out_dir/.config ${{ github.workspace }}/bazel_config
          echo "Bazel config copied"

      - name: Inject Defconfig Flags (for Make)
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          device: nezha
          enable_susfs: "false"

      - name: Generate Make .config
        run: |
          cd kernel_workspace/common
          export ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc --all) O=out gki_defconfig
          make -j$(nproc --all) O=out olddefconfig
          cp out/.config ${{ github.workspace }}/make_config

      - name: Diff Configs
        run: |
          echo "=== Lines in Bazel: $(wc -l < ${{ github.workspace }}/bazel_config) ==="
          echo "=== Lines in Make: $(wc -l < ${{ github.workspace }}/make_config) ==="
          echo ""
          echo "=== Only in Bazel ==="
          diff ${{ github.workspace }}/make_config ${{ github.workspace }}/bazel_config | grep "^>" | head -80
          echo ""
          echo "=== Only in Make ==="
          diff ${{ github.workspace }}/make_config ${{ github.workspace }}/bazel_config | grep "^<" | head -80

      - name: Upload Configs
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kernel-configs
          path: |
            ${{ github.workspace }}/bazel_config
            ${{ github.workspace }}/make_config
