name: Build MidoriSU with SuSFS (Google Official Source)

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'
      OS_PATCH_LEVEL: '2025-06'

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"

      - name: Setup Swap Space
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 25
          swap-space-path: /mnt/swapfile
          remove-existing-swap-files: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo

      - name: Sync Google Official Kernel Source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.OS_PATCH_LEVEL }} --depth=1 --partial-clone --clone-filter=blob:limit=10M
          repo sync -c -j$(nproc --all) --fail-fast --no-tags --force-sync --no-clone-bundle

      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12 https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV
          SUSFS_VERSION=$(grep -m1 'define SUSFS_VERSION' "$SUSFS_DIR/kernel_patches/include/linux/susfs.h" | sed 's/.*"\(.*\)"/\1/')
          echo "SUSFS_VERSION=${SUSFS_VERSION:-unknown}" >> $GITHUB_ENV

      - name: Setup KernelSU Variant (MidoriSU)
        run: |
          cd kernel_workspace/common
          rm -rf KernelSU drivers/kernelsu KernelSU-Next
          git clone --depth=1 --branch=main https://github.com/midori01/KernelSU.git KernelSU
          
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          
          cp -r KernelSU/uapi KernelSU/kernel/uapi 2>/dev/null || true
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          
          mkdir -p include/uapi
          cp -f KernelSU/kernel/policy/*.h include/uapi/ 2>/dev/null || true
          cp -f KernelSU/kernel/policy/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/include/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/uapi/*.h include/uapi/ 2>/dev/null || true

      - name: Patching MidoriSU and SuSFS and Build Fixes
        run: |
          cd kernel_workspace/common

          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" fs/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" include/linux/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" include/linux/
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"

          cd KernelSU
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/kowsu/10_enable_susfs_for_ksu.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/kowsu/90_fix_susfs_symbols.patch"
          cd ..

          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g' scripts/setlocalversion || true

      - name: Compile Kernel (Bazel / Kleaf)
        run: |
          cd kernel_workspace
          
          export SOURCE_DATE_EPOCH=$(date -d "2025-11-26 11:16:14" +%s)
          export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"
          
          cat > common/arch/arm64/configs/midori_susfs.fragment <<-'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          
          tools/bazel build \
            --config=release \
            --stamp \
            --notrim \
            --kbuild_user=kleaf \
            --kbuild_host=build-host \
            --defconfig_fragment=//common:arch/arm64/configs/midori_susfs.fragment \
            //common:kernel_aarch64_dist

      - name: Package and Boot-Ready Check
        run: |
          cd kernel_workspace
          
          IMAGE="$(find out/bazel/output_user_root -name "Image" -type f | grep "dist" | head -n 1)"
          if [ -z "$IMAGE" ]; then
             IMAGE="out/bazel/output_user_root/*/execroot/_main/bazel-out/k8-fastbuild/bin/common/kernel_aarch64/Image"
          fi
          
          if [ -f "out/android16-6.12/dist/Image" ]; then
            IMAGE="out/android16-6.12/dist/Image"
          fi
          
          [ -f "$IMAGE" ] || (echo "Binary Missing!" && exit 1)
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3
          
          ZIP_NAME="MidoriSU_kernel-android16-6.12.${{ inputs.sub_level }}-SuSFS.zip"
          
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-MidoriSU-SuSFS
          path: kernel_workspace/${{ env.ZIP_NAME }}
