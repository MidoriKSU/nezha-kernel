name: Test Source Size

on:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - name: Download & Compare
        run: |
          echo "=== Our Release (Google) ==="
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/android16-6.12-2025-06.tar.gz" -o /tmp/google.tar.gz
          GOOGLE_SIZE=$(stat -c%s /tmp/google.tar.gz)
          echo "Google: $GOOGLE_SIZE bytes ($((GOOGLE_SIZE/1024/1024))MB)"
          
          echo "=== cctv18 GitHub ==="
          aria2c -s16 -x16 -k1M "https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip" -o /tmp/cctv18.zip
          CCTV18_SIZE=$(stat -c%s /tmp/cctv18.zip)
          echo "cctv18: $CCTV18_SIZE bytes ($((CCTV18_SIZE/1024/1024))MB)"
          
          echo "=== Difference ==="
          echo "cctv18 is $((CCTV18_SIZE * 100 / GOOGLE_SIZE))% of Google"
          
          echo "=== Files count ==="
          echo -n "Google: "; tar -tzf /tmp/google.tar.gz | wc -l
          echo -n "cctv18: "; unzip -l /tmp/cctv18.zip | tail -1
