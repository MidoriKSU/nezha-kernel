name: Test cctv18 Source with Our Clang

on:
  workflow_dispatch:

jobs:
  build:
    name: KowSU test
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Clone cctv18 Source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip -o common.zip
          unzip -q common.zip && mv "android_gki_kernel_common-android16-6.12-2025-06" common && rm common.zip
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Init Our Clang Toolchain
        run: |
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/clang-r536225.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-aosp" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-aosp"
          echo "$GITHUB_WORKSPACE/clang-aosp/bin" >> $GITHUB_PATH

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          device: nezha
          enable_susfs: "false"

      - name: Compile Kernel
        run: |
          cd kernel_workspace/common
          export PATH="$GITHUB_WORKSPACE/clang-aosp/bin:$PATH"
          export ARCH=arm64 LLVM=1 LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang LD=ld.lld

          make -j$(nproc --all) O=out gki_defconfig
          make -j$(nproc --all) O=out Image
          
          echo "=== Image size ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Package
        run: |
          IMAGE="kernel_workspace/common/out/arch/arm64/boot/Image"
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="cctv18-source-our-clang-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cctv18-test
          path: ${{ env.ZIP_NAME }}
