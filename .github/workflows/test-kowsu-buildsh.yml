name: Test KowSU (repo init + build.sh)

on:
  workflow_dispatch:

jobs:
  build:
    name: KowSU nezha test
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Repo Init & Sync GKI Kernel
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          cp -r KernelSU/uapi KernelSU/kernel/uapi 2>/dev/null || true
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          mkdir -p include/uapi
          cp -f KernelSU/kernel/policy/*.h include/uapi/ 2>/dev/null || true
          cp -f KernelSU/kernel/policy/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/include/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/uapi/*.h include/uapi/ 2>/dev/null || true

      - name: Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name: Remove Protected Exports
        run: |
          cd kernel_workspace/common
          rm -rf android/abi_gki_protected_exports_*
          echo "Protected exports removed"

      - name: Check build.sh exists
        run: |
          ls -la kernel_workspace/build/build.sh || echo "build.sh not found"

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          device: nezha
          enable_susfs: "false"

      - name: Compile Kernel (build.sh)
        run: |
          cd kernel_workspace
          SKIP_MRPROPER=1 BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh
          
          echo "=== Image ==="
          find . -name "Image" -type f -ls 2>/dev/null || echo "Image not found"

      - name: Package
        run: |
          IMAGE=$(find kernel_workspace -name "Image" -type f 2>/dev/null | head -1)
          if [ -z "$IMAGE" ]; then
            IMAGE="kernel_workspace/common/out/arch/arm64/boot/Image"
          fi
          [ -f "$IMAGE" ] || (echo "Image not found!" && exit 1)
          ls -lh "$IMAGE"
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu-nezha-buildsh-$(date +'%y%m%d').zip"
          zip -r9 "$ZIP_NAME" *
          mv "$ZIP_NAME" ../
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kowsu-buildsh-test
          path: ${{ env.ZIP_NAME }}
