name: Extract Bazel Build Commands

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 curl

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: kernel_workspace
          key: gki-source-android16-6.12-2025-06-v2

      - name: Repo Init & Sync
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel_workspace
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          cd kernel_workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-2025-06 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle
          sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl || true
          sed -i 's/ -dirty//g; s/-maybe-dirty//g' common/scripts/setlocalversion || true

      - name: Setup KowSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Copy Bazel Fragment
        run: |
          cp .github/actions/kernel-config/nezha_gki.fragment kernel_workspace/common/arch/arm64/configs/nezha_gki.fragment

      - name: Extract Bazel Make Commands
        run: |
          cd kernel_workspace
          
          # 方法1：用 Bazel aquery 查看构建动作
          echo "=== Bazel aquery ==="
          tools/bazel aquery --config=release --stamp --notrim \
            --defconfig_fragment=//common:arch/arm64/configs/nezha_gki.fragment \
            'mnemonic("KernelBuild", //common:kernel_aarch64)' 2>/dev/null | head -100 || echo "aquery failed"
          
          # 方法2：用 --verbose_failures 触发编译，抓取完整命令
          echo ""
          echo "=== Verbose build (first 200 lines) ==="
          tools/bazel build --config=release --stamp --notrim \
            --defconfig_fragment=//common:arch/arm64/configs/nezha_gki.fragment \
            --verbose_failures \
            //common:kernel_aarch64 2>&1 | grep -E "make|clang|CC|LD|AR|KCFLAGS|LTO|TRIM" | head -50 || echo "build failed (expected, just collecting cmds)"
          
          # 方法3：直接看 Bazel 生成的 make 命令行
          echo ""
          echo "=== Bazel make command from last build ==="
          find bazel-out -name "*.params" -o -name "*-2.params" 2>/dev/null | head -5 | xargs cat 2>/dev/null | head -50
          
          echo ""
          echo "=== Stamped build info ==="
          cat bazel-out/volatile-status.txt 2>/dev/null | head -20
          cat bazel-out/stable-status.txt 2>/dev/null | head -20

