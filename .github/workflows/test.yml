name: Official GKI KowSU Build (Google Source)

on:
  workflow_dispatch: # 支持手动触发
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string

jobs:
  build:
    name: GKI-6.12.${{ inputs.sub_level }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2 tar

      - name: Initialize Official Workspace
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          
          # 1. 下载官方 Common 源码 (Google Git 归档)
          echo "Downloading official kernel common..."
          mkdir -p common
          curl -L "https://android.googlesource.com/kernel/common/+archive/refs/heads/android16-6.12.tar.gz" | tar -xzf - -C common
          
          # 2. 下载官方 Build 脚本仓库
          echo "Downloading official build scripts..."
          mkdir -p build
          curl -L "https://android.googlesource.com/kernel/build/+archive/refs/heads/android16-6.12.tar.gz" | tar -xzf - -C build
          
          # 3. 按要求下载官方 Build-Tools (AOSP 预编译工具)
          echo "Downloading official build-tools..."
          mkdir -p build-tools
          curl -L "https://android.googlesource.com/kernel/prebuilts/build-tools/+archive/refs/heads/main.tar.gz" | tar -xzf - -C build-tools
          
          # 4. 下载官方 Clang 19 (r536225)
          echo "Downloading official Clang 19..."
          mkdir -p clang19
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz" | tar -xzf - -C clang19
          
          # 移除内核版本后的 -dirty 标识以匹配官方标准
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Setup KowSU & KMI Bypass
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/common
          # 集成 KowSU
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          
          # KMI Bypass: 核心补丁，确保第三方驱动能被内核成功加载
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name: Build Environment Setup (Identity Spoofing)
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          WORKDIR="$(pwd)"
          REAL_CLANG="$WORKDIR/clang19/bin/clang"
          
          # 创建编译器包装器，伪造官方流水线版本信息
          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"
              exit 0
          fi
          exec "$REAL_CLANG" "\$@"
          EOF
          chmod +x cc-wrapper

      - name: Compile Official GKI Kernel (4K Aligned)
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          
          # 关键点：将官方 build-tools 的 linux-x86 路径加入 PATH
          export PATH="$(pwd)/build-tools/linux-x86/bin:$(pwd)/clang19/bin:$PATH"
          export ROOT_DIR="$(pwd)"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          
          # 加载官方编译环境协议
          source build/_setup_env.sh
          
          # 使用身份伪装包装器作为编译器
          export CC="$(pwd)/cc-wrapper"
          
          cd common
          # 1. 生成 GKI 配置
          make ${TOOL_ARGS} O=out gki_defconfig
          
          # 2. 强制开启 4K 页面对齐并注入 KowSU
          ../build/config.sh --file out/.config \
            -e CONFIG_KSU \
            -e CONFIG_ARM64_4K_PAGES \
            -d CONFIG_ARM64_16K_PAGES
          
          # 3. 开始编译 (使用 TOOL_ARGS 确保所有官方 Flags 生效)
          make ${TOOL_ARGS} O=out -j$(nproc) Image

      - name: Package Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          if [ ! -f "$IMAGE" ]; then echo "Image not found!"; exit 1; fi
          
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          zip -r9 "../official_gki_6.12_kowsu.zip" *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-official-google-source
          path: kernel_workspace/official_gki_6.12_kowsu.zip
