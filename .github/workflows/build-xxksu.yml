name: Build xxKSU

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      toolchain:
        required: true
        type: string
      sub_level:
        required: false
        type: string
        default: '23'

jobs:
  build:
    name: xxKSU ${{ inputs.device }} ${{ inputs.toolchain }}
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Load Device Config
        run: |
          source device/${{ inputs.device }}/config.env
          echo "CONFIG_LOCALVERSION=$CONFIG_LOCALVERSION" >> $GITHUB_ENV
          echo "KERNEL_REF=$KERNEL_REF" >> $GITHUB_ENV

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Initialize Toolchain (AOSP Clang)
        if: ${{ inputs.toolchain == 'aosp-clang' }}
        run: |
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/clang-r536225.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          echo "CLANG_BIN=$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_ENV
          echo "USE_ARM_GCC=false" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/clang/bin/clang" --version | head -1
          "$GITHUB_WORKSPACE/clang/bin/ld.lld" --version | head -1

      - name: Initialize Toolchain (ZyC Clang + ARM GCC)
        if: ${{ inputs.toolchain == 'zyc-clang' }}
        run: |
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/Clang-23.0.0git-20260130.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang" && tar -xf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          echo "CLANG_BIN=$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_ENV
          echo "USE_ARM_GCC=true" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/clang/bin/clang" --version | head -1
          "$GITHUB_WORKSPACE/clang/bin/ld.lld" --version | head -1

          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz" -o arm64.tar.xz
          mkdir -p "$GITHUB_WORKSPACE/arm64-gcc" && tar -xf arm64.tar.xz -C "$GITHUB_WORKSPACE/arm64-gcc" --strip-components=1
          echo "ARM64_TOOLCHAIN=$GITHUB_WORKSPACE/arm64-gcc/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/arm64-gcc/bin/aarch64-none-linux-gnu-gcc" --version | head -1

          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi.tar.xz" -o arm32.tar.xz
          mkdir -p "$GITHUB_WORKSPACE/arm32-gcc" && tar -xf arm32.tar.xz -C "$GITHUB_WORKSPACE/arm32-gcc" --strip-components=1
          echo "ARM32_TOOLCHAIN=$GITHUB_WORKSPACE/arm32-gcc/bin/arm-none-eabi-" >> $GITHUB_ENV
          "$GITHUB_WORKSPACE/arm32-gcc/bin/arm-none-eabi-gcc" --version | head -1

      - name: Clone GKI Kernel
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          git clone --depth=1 https://android.googlesource.com/kernel/common -b ${{ env.KERNEL_REF }} common

      - name: Setup xxKSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/backslashxx/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Get KSU Version
        run: |
          git clone --depth=1 https://github.com/TheSillyOk/sh scripts-temp
          KSU_VER=$(bash scripts-temp/get_ksuver.sh "backslashxx" "KernelSU" "master" || echo "unknown")
          echo "KSU_VERSION=$KSU_VER" >> $GITHUB_ENV
          rm -rf scripts-temp

      - name: Create Patch Healer
        run: |
          cat > "${{ github.workspace }}/kernel_workspace/common/heal_patch.py" << 'PYEOF'
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              lines = f.read().splitlines()
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as f:
              in_hunk = False
              for line in lines:
                  if line.startswith('@@ '): in_hunk = True; f.write(line + '\n'); continue
                  if line.startswith(('--- ', '+++ ')): in_hunk = False; f.write(line + '\n'); continue
                  if not in_hunk: f.write(line + '\n'); continue
                  if len(line) == 0: f.write(' \n')
                  elif line[0] not in ['+', '-', ' ', '\\']: f.write(' ' + line + '\n')
                  else: f.write(line + '\n')
          PYEOF

      - name: Apply Patches xxKSU (Security & Scope Hooks)
        run: |
          cd kernel_workspace/common
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"

      - name: Apply SYSVIPC KABI Fix
        run: |
          cd kernel_workspace/common
          patch -p1 < "${{ github.workspace }}/.github/patches/gki/fix_sysvipc_kabi_a16-6.12.patch"

      - name: Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name: Inject Device Localversion
        run: |
          cd kernel_workspace/common
          echo "CONFIG_LOCALVERSION=\"${{ env.CONFIG_LOCALVERSION }}\"" >> arch/arm64/configs/gki_defconfig

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "xxksu"
          device: ${{ inputs.device }}
          enable_susfs: "false"

      - name: Fix Localversion
        run: |
          echo 'echo ""' > kernel_workspace/common/scripts/setlocalversion

      - name: Compile Kernel
        run: |
          CLANG_BIN="${{ env.CLANG_BIN }}"

          cd kernel_workspace/common

          cp "$GITHUB_WORKSPACE/lib/libfakestat.so" ./
          cp "$GITHUB_WORKSPACE/lib/libfaketimeMT.so" ./

          export ARCH=arm64
          export PATH="$CLANG_BIN:$PATH"
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export LD="$CLANG_BIN/ld.lld"
          export HOSTLD="$CLANG_BIN/ld.lld"
          export AR="$CLANG_BIN/llvm-ar"
          export HOSTAR="$CLANG_BIN/llvm-ar"
          export NM="$CLANG_BIN/llvm-nm"
          export OBJCOPY="$CLANG_BIN/llvm-objcopy"
          export OBJDUMP="$CLANG_BIN/llvm-objdump"
          export READELF="$CLANG_BIN/llvm-readelf"
          export STRIP="$CLANG_BIN/llvm-strip"
          export CLANG_TRIPLE="aarch64-linux-gnu-"

          if [ "${{ env.USE_ARM_GCC }}" = "true" ]; then
            export PATH="${{ env.ARM64_TOOLCHAIN }}:${{ env.ARM32_TOOLCHAIN }}:$PATH"
            CROSS_COMPILE_EXTRA="CROSS_COMPILE_COMPAT=${{ env.ARM32_TOOLCHAIN }}"
            KCFLAGS="$KCFLAGS"
          else
            CROSS_COMPILE_EXTRA=""
            KCFLAGS=""
          fi

          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android clang version 19.0.1"
              exit 0
          fi
          export LD_PRELOAD="$GITHUB_WORKSPACE/kernel_workspace/common/libfakestat.so $GITHUB_WORKSPACE/kernel_workspace/common/libfaketimeMT.so"
          export FAKESTAT="2025-09-12 04:57:41"
          export FAKETIME="@2025-09-12 04:57:41"
          exec "$CLANG_BIN/clang" "\$@"
          EOF
          chmod +x cc-wrapper

          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Wed Nov 26 11:16:14 UTC 2025"
          export CC="$(pwd)/cc-wrapper"

          make -j$(nproc --all) O=out \
            ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="$KCFLAGS" \
            CC="$CC" LD="$LD" AR="$AR" NM="$NM" OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" \
            READELF="$READELF" STRIP="$STRIP" HOSTCC="$CC" HOSTCXX="$CC" \
            HOSTLD="$HOSTLD" HOSTAR="$HOSTAR" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" $CROSS_COMPILE_EXTRA \
            gki_defconfig

          make -j$(nproc --all) O=out \
            ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="$KCFLAGS" \
            CC="$CC" LD="$LD" AR="$AR" NM="$NM" OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" \
            READELF="$READELF" STRIP="$STRIP" HOSTCC="$CC" HOSTCXX="$CC" \
            HOSTLD="$HOSTLD" HOSTAR="$HOSTAR" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" $CROSS_COMPILE_EXTRA \
            Image

      - name: Package
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo "Image binary missing!" && exit 1)

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3

          ZIP_NAME="xxksu-r${{ env.KSU_VERSION }}-${{ inputs.device }}-${{ inputs.toolchain }}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: xxksu-r${{ env.KSU_VERSION }}-${{ inputs.device }}-${{ inputs.toolchain }}
          path: kernel_workspace/${{ env.ZIP_NAME }}
